name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore (if secrets set)
        id: decode_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p app/keystore
            echo "$KEYSTORE_BASE64" | base64 -d > app/keystore/didadida.jks
            echo "storeFile=app/keystore/didadida.jks" > signing.properties
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> signing.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> signing.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> signing.properties
            echo "keystore_ready=true" >> $GITHUB_OUTPUT
          else
            echo "keystore_ready=false" >> $GITHUB_OUTPUT
          fi

      - name: Build APKs
        run: |
          ./gradlew assembleDebug
          if [ "${{ steps.decode_keystore.outputs.keystore_ready }}" = "true" ]; then
            ./gradlew assembleRelease
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DidaDida-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK (signed)
        if: steps.decode_keystore.outputs.keystore_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DidaDida-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
